<!DOCTYPE html>
<html lang="en">
<head>
	<meta charset="UTF-8" />
	<meta name="viewport" content="width=device-width, initial-scale=1.0" />
	<title>Image Annotator Recorder</title>
	<link rel="preconnect" href="https://fonts.googleapis.com" />
	<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
	<link href="https://fonts.googleapis.com/css2?family=Space+Grotesk:wght@400;500;700&family=Sora:wght@500;700&display=swap" rel="stylesheet" />
	<link rel="stylesheet" href="style.css" />
</head>
<body>
	<div class="ambient-shape shape-a"></div>
	<div class="ambient-shape shape-b"></div>

	<main class="app-shell">
		<header class="topbar">
			<div>
				<p class="eyebrow">Interactive Workspace</p>
				<h1>Annotate Images + Record Session</h1>
				<div id="taskContainer" class="task-container"></div>
				<p id="imageProgress" class="image-progress">Photo 1 of 3</p>
			</div>

			<div class="timer-card" aria-live="polite">
				<span class="timer-label">Photo Timer</span>
				<span id="timer" class="timer-value">00:30</span>
				<button id="pauseBtn" type="button" class="pause-btn" disabled>Pause</button>
			</div>
		</header>

		<section class="toolbar" aria-label="Annotation and recording controls">
			<input id="labelText" type="text" placeholder="Label text (e.g. 'Door')" />

			<label class="color-wrap">
				Trail Color
				<input id="trailColor" type="color" value="#ff5a3d" />
			</label>

			<button id="clearTrailBtn" type="button">Clear Trail</button>
			<button id="startRecordingBtn" type="button" class="record-start">Start Recording</button>
			<button id="endRecordingBtn" type="button" class="record-end" disabled>End Recording</button>
			<button id="nextImageBtn" type="button" class="next-image-btn is-hidden" disabled>Next Image</button>
			<button id="downloadAllBtn" type="button" class="download-all-btn is-hidden" disabled>download recording and images</button>
		</section>

		<section class="workspace">
			<div class="stage-panel">
				<div id="imageStage" class="image-stage" aria-label="Annotation area">
					<div id="frame" class="image-frame">
						<img id="activeImage" alt="Selected folder image for annotation" />
						<canvas id="trailCanvas"></canvas>
						<div id="labelsLayer" class="labels-layer"></div>
					</div>
				</div>
			</div>
		</section>

		<p id="statusText" class="status-text" aria-live="polite">Ready.</p>
	</main>

	<script src="script.js"></script>
</body>
</html>
